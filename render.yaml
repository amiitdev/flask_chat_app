services:
  - type: web
    name: flask-chat-app
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && python -c "import psycopg2; print('psycopg2 OK')"
    startCommand: gunicorn --worker-class eventlet -w 1 --timeout 120 app:app
    envVars:
      - key: FLASK_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: chat-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

databases:
  - name: chat-db
    databaseName: chatdb
    user: chatuser
