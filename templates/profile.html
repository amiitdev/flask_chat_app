{% extends "base.html" %}

{% block title %}Profile - ChatApp{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center min-vh-100 bg-light">
    <div class="card shadow-lg border-0 rounded-4" style="width: 450px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <div class="position-relative d-inline-block mb-3">
                    <img id="current-avatar" src="{{ current_user.profile_pic if current_user.profile_pic and current_user.profile_pic.startswith('http') else '/static/uploads/profiles/' + (current_user.profile_pic if current_user.profile_pic else 'default.png') }}"
                         class="rounded-circle border border-3 border-primary" width="120" height="120" style="object-fit:cover;">
                    <label for="profile-upload" class="position-absolute bottom-0 end-0 bg-primary text-white rounded-circle d-flex align-items-center justify-content-center cursor-pointer" style="width:36px;height:36px;cursor:pointer;">
                        <i class="fas fa-camera"></i>
                    </label>
                </div>
                <h3 class="fw-bold">{{ current_user.username }}</h3>
                <p class="text-muted">Update your profile picture</p>
            </div>
            <form id="profile-form" enctype="multipart/form-data">
                <div class="mb-4 text-center">
                    <input type="file" id="profile-upload" accept="image/*" class="d-none">
                    <div id="profile-preview-area" class="d-none">
                        <p class="text-muted small mb-2">Preview:</p>
                        <img id="profile-preview" src="" class="img-thumbnail rounded-circle" style="width:100px;height:100px;object-fit:cover;">
                    </div>
                    <p class="text-muted small mt-2">Allowed: PNG, JPG, JPEG, GIF, WEBP (max 16MB)</p>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill fw-bold">
                    <i class="fas fa-save me-2"></i>Save Changes
                </button>
            </form>
            <div id="upload-status" class="mt-3"></div>
            <div class="text-center mt-3">
                <a href="{{ url_for('main.index') }}" class="text-muted text-decoration-none">
                    <i class="fas fa-arrow-left me-1"></i>Back to Chat
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('profile-form');
    const input = document.getElementById('profile-upload');
    const preview = document.getElementById('profile-preview');
    const previewArea = document.getElementById('profile-preview-area');
    const currentAvatar = document.getElementById('current-avatar');
    const statusDiv = document.getElementById('upload-status');

    input.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            preview.src = URL.createObjectURL(file);
            previewArea.classList.remove('d-none');
        }
    });

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        if (!input.files[0]) {
            statusDiv.innerHTML = '<div class="alert alert-warning">Please select an image first.</div>';
            return;
        }

        const formData = new FormData();
        formData.append('file', input.files[0]);

        statusDiv.innerHTML = '<div class="alert alert-info">Uploading...</div>';

        fetch('/upload-profile', {
            method: 'POST',
            body: formData
        })
        .then(r => r.json())
        .then(data => {
            if (data.url) {
                statusDiv.innerHTML = '<div class="alert alert-success">Profile picture updated!</div>';
                currentAvatar.src = data.url + '?t=' + new Date().getTime();
                previewArea.classList.add('d-none');
                input.value = '';
                setTimeout(() => {
                    statusDiv.innerHTML = '';
                }, 2000);
            } else {
                statusDiv.innerHTML = '<div class="alert alert-danger">' + (data.error || 'Upload failed') + '</div>';
            }
        })
        .catch(err => {
            statusDiv.innerHTML = '<div class="alert alert-danger">Upload failed. Please try again.</div>';
        });
    });
});
</script>
{% endblock %}
