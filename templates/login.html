{% extends "base.html" %}

{% block title %}Login - ChatApp{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-center min-vh-100 bg-light">
    <div class="card shadow-lg border-0 rounded-4" style="width: 400px;">
        <div class="card-body p-5">
            <div class="text-center mb-4">
                <i class="fas fa-comments fa-3x text-primary mb-3"></i>
                <h3 class="fw-bold">Welcome Back</h3>
                <p class="text-muted">Sign in to continue to ChatApp</p>
            </div>
            <form method="POST">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0">
                            <i class="fas fa-user text-muted"></i>
                        </span>
                        <input type="text" class="form-control bg-light border-start-0" name="username" placeholder="Enter username" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0">
                            <i class="fas fa-lock text-muted"></i>
                        </span>
                        <input type="password" class="form-control bg-light border-start-0" name="password" placeholder="Enter password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 rounded-pill fw-bold">
                    <i class="fas fa-sign-in-alt me-2"></i>Sign In
                </button>
            </form>
            <div class="text-center mt-4">
                <p class="text-muted">Don't have an account?
                    <a href="{{ url_for('auth.signup') }}" class="text-primary fw-bold text-decoration-none">Sign Up</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
