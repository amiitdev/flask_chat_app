{% extends "base.html" %}

{% block title %}Settings{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow-lg p-4">
                <h2 class="card-title text-center mb-4">User Settings</h2>
                <form method="POST" action="{{ url_for('settings.user_settings') }}">
                    <div class="mb-4">
                        <h5 class="mb-3">Theme Settings</h5>
                        <div class="form-check form-switch mb-2">
                            <input class="form-check-input" type="radio" name="theme_preference" id="themeDark" value="dark" {% if user.theme_preference == 'dark' %}checked{% endif %}>
                            <label class="form-check-label" for="themeDark">Dark Theme</label>
                        </div>
                        <div class="form-check form-switch mb-2">
                            <input class="form-check-input" type="radio" name="theme_preference" id="themeLight" value="light" {% if user.theme_preference == 'light' %}checked{% endif %}>
                            <label class="form-check-label" for="themeLight">Light Theme</label>
                        </div>
                        <div class="form-check form-switch mb-2">
                            <input class="form-check-input" type="radio" name="theme_preference" id="themeBlue" value="blue" {% if user.theme_preference == 'blue' %}checked{% endif %}>
                            <label class="form-check-label" for="themeBlue">Blue Theme</label>
                        </div>
                        <div class="form-check form-switch mb-2">
                            <input class="form-check-input" type="radio" name="theme_preference" id="themeGreen" value="green" {% if user.theme_preference == 'green' %}checked{% endif %}>
                            <label class="form-check-label" for="themeGreen">Green Theme</label>
                        </div>
                        <div class="form-check form-switch mb-2">
                            <input class="form-check-input" type="radio" name="theme_preference" id="themePurple" value="purple" {% if user.theme_preference == 'purple' %}checked{% endif %}>
                            <label class="form-check-label" for="themePurple">Purple Theme</label>
                        </div>
                    </div>

                    <div class="mb-4">
                        <h5 class="mb-3">Sound Settings</h5>
                        <div class="form-check form-switch mb-2">
                            <input class="form-check-input" type="checkbox" name="sound_enabled" id="soundEnabled" {% if user.sound_enabled %}checked{% endif %}>
                            <label class="form-check-label" for="soundEnabled">Enable Notification Sounds</label>
                        </div>
                        <div class="mb-3">
                            <label for="notificationSoundChoice" class="form-label">Notification Sound:</label>
                            <select class="form-select" id="notificationSoundChoice" name="notification_sound_choice">
                                {% for sound_file in sound_files %}
                                <option value="{{ sound_file }}" {% if user.notification_sound_choice == sound_file %}selected{% endif %}>{{ sound_file | replace('_', ' ') | capitalize }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="mb-4">
                        <h5 class="mb-3">Privacy Settings</h5>
                        <div class="form-check form-switch mb-2">
                            <input class="form-check-input" type="checkbox" name="show_online_status" id="showOnlineStatus" {% if user.show_online_status %}checked{% endif %}>
                            <label class="form-check-label" for="showOnlineStatus">Show Online Status</label>
                        </div>
                        <div class="form-check form-switch mb-2">
                            <input class="form-check-input" type="checkbox" name="typing_status_enabled" id="typingStatusEnabled" {% if user.typing_status_enabled %}checked{% endif %}>
                            <label class="form-check-label" for="typingStatusEnabled">Enable Typing Status (others see when you type)</label>
                        </div>
                        <div class="form-check form-switch mb-2">
                            <input class="form-check-input" type="checkbox" name="read_receipts_enabled" id="readReceiptsEnabled" {% if user.read_receipts_enabled %}checked{% endif %}>
                            <label class="form-check-label" for="readReceiptsEnabled">Enable Read Receipts (others see when you read their messages)</label>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-3">Save Changes</button>
                </form>

                <hr>

                <div class="d-grid gap-2">
                    <button class="btn btn-warning" onclick="confirmClearChats()">
                        <i class="fas fa-trash-alt me-2"></i>Clear All Chats
                    </button>
                    <small class="text-muted">Clears all messages between you and the currently selected chat user</small>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let currentChatUserId = null;

function setCurrentChatUser(userId) {
    currentChatUserId = userId;
}

function confirmClearChats() {
    if (!currentChatUserId) {
        alert('Please select a chat user first from the main page.');
        return;
    }
    if (confirm('Are you sure you want to delete all messages with this user? This action cannot be undone.')) {
        fetch('{{ url_for("settings.clear_chats", user_id=0) }}'.replace('0', currentChatUserId), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' }
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            if (data.success) {
                alert('Chat cleared successfully!');
                location.reload();
            } else {
                alert('Error: ' + (data.error || 'Unknown error'));
            }
        })
        .catch(function(err) { alert('Error clearing chats: ' + err); });
    }
}
</script>
{% endblock %}

{% block scripts %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const themeRadios = document.querySelectorAll('input[name="theme_preference"]');
    themeRadios.forEach(function(radio) {
        radio.addEventListener('change', function() {
            if (this.checked) {
                switchTheme(this.value);
            }
        });
    });
});
</script>
{% endblock %}
